sonar.projectKey=eclipse-ankaios_ankaios
sonar.organization=eclipse-ankaios

sonar.sources=agent/src,server/src,ank/src,common/src,grpc/src,ankaios_api/src,ank_schema/src,spec_macros/src
sonar.tests=agent/src,server/src,ank/src,common/src,grpc/src,ankaios_api/src,ank_schema/src,spec_macros/src
sonar.test.inclusions=**/*test*/**,**/*tests*/**,**/test_*.rs,**/*_test.rs
sonar.exclusions=**/test_utils.rs,**/test_helper/**,**/test_helper.rs

# Coverage: LCOV converted to SonarCloud generic coverage XML
# (SonarCloud does not natively parse LCOV for Rust)
sonar.coverageReportPaths=target/sonar/coverage.xml

sonar.sourceEncoding=UTF-8
