name: SonarCloud Analysis

on:
  pull_request:
  push:
    branches:
      - main
      - release-**

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: "sonarcloud-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eclipse-ankaios/devcontainer-base:1.2.0
      options: --privileged
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run unit tests with coverage (LCOV)
        run: |
          mkdir -p target/sonar
          RUST_LOG=debug cargo llvm-cov nextest \
            --ignore-filename-regex '/main\.rs|/test_utils\.rs|server/src/cli\.rs|/objects/agent_map\.rs' \
            --lcov --output-path target/sonar/lcov.info

      - name: Convert LCOV to SonarCloud generic coverage XML
        run: |
          python3 - target/sonar/lcov.info target/sonar/coverage.xml << 'PYEOF'
          import sys, os, html

          def lcov_to_sonar(lcov_path, output_path):
              lines_out = ['<coverage version="1">']
              current_file = None
              file_lines = []

              with open(lcov_path) as f:
                  for raw in f:
                      line = raw.strip()
                      if line.startswith('SF:'):
                          if current_file and file_lines:
                              lines_out.append(f'  <file path="{html.escape(current_file)}">')
                              lines_out.extend(file_lines)
                              lines_out.append('  </file>')
                          filepath = line[3:]
                          if os.path.isabs(filepath):
                              cwd = os.getcwd()
                              if filepath.startswith(cwd):
                                  filepath = os.path.relpath(filepath, cwd)
                          current_file = filepath
                          file_lines = []
                      elif line.startswith('DA:'):
                          parts = line[3:].split(',')
                          if len(parts) >= 2:
                              line_num = parts[0]
                              hits = int(parts[1])
                              covered = 'true' if hits > 0 else 'false'
                              file_lines.append(
                                  f'    <lineToCover lineNumber="{line_num}" covered="{covered}"/>'
                              )
                      elif line == 'end_of_record':
                          if current_file and file_lines:
                              lines_out.append(f'  <file path="{html.escape(current_file)}">')
                              lines_out.extend(file_lines)
                              lines_out.append('  </file>')
                          current_file = None
                          file_lines = []

              lines_out.append('</coverage>')
              with open(output_path, 'w') as f:
                  f.write('\n'.join(lines_out))

          lcov_to_sonar(sys.argv[1], sys.argv[2])
          PYEOF

      # Secrets are withheld from pull_request runs opened by Dependabot or from forks,
      # so the scan itself can't happen here. Persist the reports + PR metadata as an
      # artifact and let the trusted sonarcloud-pr-scan.yml (workflow_run) do the upload.
      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          python3 -c "
          import json, os
          json.dump({
              'number': os.environ['PR_NUMBER'],
              'headSha': os.environ['PR_HEAD_SHA'],
              'headRef': os.environ['PR_HEAD_REF'],
              'baseRef': os.environ['PR_BASE_REF'],
          }, open('target/sonar/pr.json', 'w'))
          "

      - name: Upload sonar reports
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sonar-reports
          path: target/sonar
          retention-days: 1

      - name: SonarCloud Scan
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
