// TODO: this should be corrected and the example should use a published interface, i.e. ank_base
syntax = "proto3";
package grpc_api;

import "ank_base.proto";

message UpdateWorkload {
  repeated AddedWorkload   addedWorkloads   = 1;
  repeated DeletedWorkload deletedWorkloads = 2;
}

message AddedWorkload {
  ank_base.WorkloadInstanceName instanceName = 1;
  ank_base.Workload             workload     = 2;
}

message DeletedWorkload {
  ank_base.WorkloadInstanceName instanceName = 1;
  map<string, DeleteCondition>  dependencies = 2;
}

enum DeleteCondition {
  DEL_COND_RUNNING                 = 0;
  DEL_COND_NOT_PENDING_NOR_RUNNING = 1;
}
