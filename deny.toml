# Config file for cargo deny
# For all options see https://github.com/EmbarkStudios/cargo-deny/blob/main/deny.template.toml

# If you add a license in the following section also consider changing about.toml
[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    # "OpenSSL",
    "Unicode-3.0",
]
private = { ignore = true }
exceptions = [
    { name = "unicode-ident", allow = ["Unicode-3.0"] },
    { name = "foldhash", allow = ["Zlib"] },
    { name = "borrow-or-share", allow = ["MIT-0"] },
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[advisories]
ignore = [
    # proc-macro-error2 is used by tabled_derive (dependency of tabled).
    # The advisory confirms no safe upgrade is available as of the latest tabled release.
    # A fix is already available in tabled, but the release would be delayed: https://github.com/zhiburt/tabled/pull/584#issuecomment-4778335205
    { id = "RUSTSEC-2026-0173", reason = "tabled_derive depends on proc-macro-error2 and no safe upgrade is available upstream" },
]

[bans]
multiple-versions = "allow"
